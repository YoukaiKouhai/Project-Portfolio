<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Projects</title>
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body>
    <h1>Projects</h1>
    <p>Explore projects by year, search across project details, or click a pie slice to filter the list.</p>

    <div class="projects-visualization">
      <svg id="projects-pie-plot" viewBox="-50 -50 100 100" role="img" aria-label="Projects by year pie chart"></svg>
      <ul class="legend" aria-label="Project years"></ul>
    </div>

    <input
      class="searchBar"
      type="search"
      aria-label="Search projects"
      placeholder="Search projects..."
    >

    <div class="projects"></div>

    <!-- Only load the entry point script -->
    <script src="projects.js" type="module"></script>
  </body>
</html>
