<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Meta Analysis</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <script type="module" src="../global.js"></script>

  <main class="meta-page">
    <h1>Code Meta Analysis</h1>
    <p>
      A D3 view of this portfolio codebase, using line-of-code metadata to summarize
      the project and explore commits by date, time, and lines edited.
    </p>

    <section>
      <h2>Summary Stats</h2>
      <div id="stats"></div>
    </section>

    <section>
      <h2>Commits by Time of Day</h2>
      <div id="chart" aria-label="Scatterplot of commits by date and time of day"></div>
    </section>

    <section class="selection-summary">
      <h2>Selected Commits</h2>
      <p id="selection-count">No commits selected</p>
      <dl id="language-breakdown" class="stats"></dl>
    </section>

    <dl id="commit-tooltip" class="info tooltip" hidden>
      <dt>Commit</dt>
      <dd><a href="" id="commit-link" target="_blank" rel="noopener noreferrer"></a></dd>

      <dt>Date</dt>
      <dd id="commit-date"></dd>

      <dt>Time</dt>
      <dd id="commit-time"></dd>

      <dt>Author</dt>
      <dd id="commit-author"></dd>

      <dt>Lines edited</dt>
      <dd id="commit-lines"></dd>
    </dl>
  </main>

  <script src="main.js" type="module"></script>
</body>
</html>
