<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bikewatching</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="map.css">
  <script src="map.js" type="module"></script>
</head>
<body>
  <header>
    <a href="../projects/" class="back-link">Back to projects</a>
    <h1>Bikewatching</h1>
    <p>
      An interactive map of Boston-area bike lanes and Bluebikes station traffic
      from March 2024.
    </p>
  </header>

  <aside class="time-filter" aria-label="Traffic time filter">
    <label for="time-slider">
      Time of day
      <strong id="selected-time"></strong>
      <span id="any-time">(any time)</span>
    </label>
    <input id="time-slider" type="range" min="-1" max="1439" value="-1">
  </aside>

  <main id="map-wrap">
    <div id="map" aria-label="Boston bike traffic map">
      <svg aria-hidden="true"></svg>
    </div>
  </main>

  <div class="traffic-legend" aria-label="Traffic flow legend">
    <span>Legend:</span>
    <div style="--departure-ratio: 1">More departures</div>
    <div style="--departure-ratio: 0.5">Balanced</div>
    <div style="--departure-ratio: 0">More arrivals</div>
  </div>
</body>
</html>
